version: "3.9"

services:
  # ─────────────────────────────────────────────
  # Reverse Proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cl_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - cl_network

  # ─────────────────────────────────────────────
  # Laravel Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cl_backend
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-champions_league}
      - DB_USERNAME=${DB_USERNAME:-cluser}
      - DB_PASSWORD=${DB_PASSWORD:-clpassword}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cl_network

  # ─────────────────────────────────────────────
  # Vue.js Frontend
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cl_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost/api
    networks:
      - cl_network

  # ─────────────────────────────────────────────
  # MySQL Database
  # ─────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: cl_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-champions_league}
      MYSQL_USER: ${DB_USERNAME:-cluser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-clpassword}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cl_network

networks:
  cl_network:
    driver: bridge

volumes:
  db_data:
